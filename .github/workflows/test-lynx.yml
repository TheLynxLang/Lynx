name: Build, Install, and Test Lynx

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Lynx
        run: |
          gcc main.c scanner.c parser.c memory.c pawcom.c libloader.c -o lynx.exe -lurlmon -luser32

      - name: Copy files for installer
        run: |
          mkdir installer\files
          copy lynx.exe installer\files\
          xcopy std installer\files\std /E /I
          xcopy scripts installer\files\scripts /E /I

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Lynx.iss

      - name: Run installer silently
        run: |
          cmd /c installer\Lynx-1.4.0-installer.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

      - name: Test Lynx commands
        run: |
          lynx --version
          lynx help

          lynx init
          lynx add meowsys
          lynx install
          lynx build

          lynx files
          lynx cat lynx.toml
          lynx project info

          lynx list pkgs
          lynx list registry
          lynx search meowsys

          lynx update
          lynx remove meowsys

          lynx publish
          lynx fmt src/main.lnx
          lynx check src/main.lnx

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: lynx-installer
          path: installer\Lynx-1.4.0-installer.exe