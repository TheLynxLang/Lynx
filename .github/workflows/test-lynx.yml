name: Build, Install, and Test Lynx

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Lynx
        run: |
          gcc main.c scanner.c parser.c memory.c pawcom.c libloader.c -o lynx.exe -lurlmon -luser32

      - name: Copy files for installer
        run: |
          mkdir installer\files
          copy lynx.exe installer\files\
          xcopy std installer\files\std /E /I
          xcopy scripts installer\files\scripts /E /I

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Lynx.iss

      - name: List installer folder (debug)
        run: |
          dir installer

      - name: Run installer silently
        run: |
          cmd /c installer\installer\Lynx-1.4.0-installer.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

      - name: Test Lynx commands
        run: |
          C:\"Program Files"\Lynx\lynx.exe --version
          C:\"Program Files"\Lynx\lynx.exe help

          C:\"Program Files"\Lynx\lynx.exe init
          C:\"Program Files"\Lynx\lynx.exe add meowsys
          C:\"Program Files"\Lynx\lynx.exe install
          C:\"Program Files"\Lynx\lynx.exe build

          C:\"Program Files"\Lynx\lynx.exe files
          C:\"Program Files"\Lynx\lynx.exe cat lynx.toml
          C:\"Program Files"\Lynx\lynx.exe project info

          C:\"Program Files"\Lynx\lynx.exe list pkgs
          C:\"Program Files"\Lynx\lynx.exe list registry
          C:\"Program Files"\Lynx\lynx.exe search meowsys

          C:\"Program Files"\Lynx\lynx.exe update
          C:\"Program Files"\Lynx\lynx.exe remove meowsys

          C:\"Program Files"\Lynx\lynx.exe publish
          C:\"Program Files"\Lynx\lynx.exe fmt src/main.lnx
          C:\"Program Files"\Lynx\lynx.exe check src/main.lnx

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: lynx-installer
          path: installer\installer\Lynx-1.4.0-installer.exe