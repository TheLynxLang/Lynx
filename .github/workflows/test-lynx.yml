name: Build, Install, and Test Lynx

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install MinGW (if needed)
        run: |
          if (!(Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw -y
          }

      - name: Build Lynx
        run: |
          gcc -g -O0 -Wall main.c scanner.c parser.c memory.c pawcom.c libloader.c -o lynx.exe -lurlmon -luser32 -lm
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Prepare installer files
        run: |
          mkdir installer\files -Force
          copy lynx.exe installer\files\
          if (Test-Path std) { xcopy std installer\files\std /E /I /Y } else { mkdir installer\files\std }
          if (Test-Path scripts) { xcopy scripts installer\files\scripts /E /I /Y } else { exit 1 }

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Lynx.iss
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run installer silently
        run: |
          $installer = Get-ChildItem -Path installer -Recurse -Filter "Lynx-*.exe" | Select-Object -First 1
          if (!$installer) { exit 1 }
          Start-Process -FilePath $installer.FullName -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Test Lynx commands
        run: |
          $lynx = "C:\Program Files\Lynx\lynx.exe"
          Write-Host "=== TESTING LYNX ===" -ForegroundColor Cyan
          & $lynx --version
          & $lynx help
          & $lynx init
          & $lynx add meowsys
          & $lynx install
          & $lynx build
          & $lynx search meowsys
          & $lynx update
          & $lynx remove meowsys
          & $lynx fmt src/main.lnx
          & $lynx check src/main.lnx

      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynx-installer-windows
          path: installer\installer\Lynx-*.exe
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc make gdb valgrind

      - name: Build Lynx with debug symbols
        run: |
          gcc -g -O0 -Wall -Wextra -Wpedantic main.c scanner.c parser.c memory.c pawcom.c libloader.c -o lynx -lX11 -ldl -lm
          if [ $? -ne 0 ]; then exit 1; fi

      - name: Enable core dumps
        run: |
          ulimit -c unlimited
          echo "core.%p.%e" | sudo tee /proc/sys/kernel/core_pattern

      - name: Prepare installer files
        run: |
          mkdir -p installer/files
          cp lynx installer/files/
          if [ -d std ]; then cp -r std installer/files/; else mkdir -p installer/files/std; fi
          if [ -d scripts ]; then cp -r scripts installer/files/; else echo "scripts folder missing"; exit 1; fi

      - name: Build .deb package
        run: |
          mkdir -p build-deb/usr/bin build-deb/DEBIAN
          cp installer/files/lynx build-deb/usr/bin/
          cp -r installer/files/std build-deb/usr/bin/ 2>/dev/null || true
          cp -r installer/files/scripts build-deb/usr/bin/ 2>/dev/null || true
          cat > build-deb/DEBIAN/control << EOF
          Package: lynx-lang
          Version: 1.0.0
          Maintainer: justdev-chris
          Architecture: amd64
          Description: Lynx programming language
          EOF
          dpkg-deb --build build-deb lynx-lang.deb

      - name: Install .deb package
        run: |
          sudo dpkg -i lynx-lang.deb || sudo apt-get install -f -y

      - name: Test Lynx commands with GDB on crash
        run: |
          echo "=== VERSION ==="
          lynx --version
          echo "=== HELP ==="
          lynx help
          echo "=== INIT ==="
          lynx init
          echo "=== ADD ==="
          lynx add meowsys
          echo "=== INSTALL ==="
          lynx install
          echo "=== BUILD (with GDB if crash) ==="
          if ! lynx build 2>&1; then
            echo "❌ Crash detected! Running GDB..."
            gdb -ex "run build" -ex "thread apply all bt full" -ex "info registers" -ex "quit" ./lynx 2>&1 | tee gdb_output.txt
            echo "=== GDB OUTPUT ==="
            cat gdb_output.txt
          fi
          echo "=== SEARCH ==="
          lynx search meowsys
          echo "=== UPDATE ==="
          lynx update
          echo "=== REMOVE ==="
          lynx remove meowsys
          echo "=== FMT ==="
          lynx fmt src/main.lnx
          echo "=== CHECK ==="
          lynx check src/main.lnx

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynx-debug-logs
          path: |
            gdb_output.txt
            core.*
            *.log
          if-no-files-found: warn

      - name: Upload .deb package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynx-installer-linux
          path: lynx-lang.deb
          if-no-files-found: warn