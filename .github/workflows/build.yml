name: Build Lynx Engine

on: [push]

jobs:
  build-engine:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Compile Engine
      run: gcc main.c scanner.c parser.c memory.c libloader.c -o lynx.exe -lurlmon -luser32

    - name: Build Installer
      run: |
        cd installer
        & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" Lynx.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: Lynx-Installer
        path: installer/installer/Lynx-*.exe

    - name: Upload Engine
      uses: actions/upload-artifact@v4
      with:
        name: lynx-engine
        path: lynx.exe